services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dataflow-backend:latest
    container_name: dataflow-backend
    ports:
      - "8000:8000"
    environment:
      BACKEND_LOG_PATH: /app/logs/backend.log
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
